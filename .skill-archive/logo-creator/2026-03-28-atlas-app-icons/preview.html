<!DOCTYPE html>
<html>
<head>
<title>Atlas App Icons</title>
<style>
body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: system-ui; }
.grid { display: flex; gap: 32px; }
.icon { text-align: center; }
.icon img { width: 120px; height: 120px; border-radius: 24px; }
.icon p { color: #fff; margin-top: 8px; font-size: 14px; }
</style>
</head>
<body>
<div class="grid">
  <div class="icon"><img src="write-01.png"><p>Write</p></div>
  <div class="icon"><img src="draw-01.png"><p>Draw</p></div>
  <div class="icon"><img src="tasks-01.png"><p>Tasks</p></div>
  <div class="icon"><img src="tables-01.png"><p>Tables</p></div>
  <div class="icon"><img src="drive-01.png"><p>Drive</p></div>
</div>
</body>
</html>
